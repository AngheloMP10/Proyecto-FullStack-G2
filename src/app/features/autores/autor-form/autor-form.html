<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">{{ isEditing ? 'Editar Autor' : 'Nuevo Autor' }}</h3>
        </div>

        <div class="card-body">
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre del Autor</label>
              <input
                type="text"
                class="form-control"
                id="nombre"
                [(ngModel)]="autor.nombre"
                name="nombre"
                placeholder="Ej: Gabriel García Márquez"
                required
              />
            </div>

            <div class="mb-3">
              <label for="fotoFile" class="form-label">Foto del Autor</label>

              <input
                class="form-control"
                type="file"
                id="fotoFile"
                (change)="onFileSelected($event)"
                accept="image/*"
              />

              <!-- URL que devuelve Cloudinary -->
              <input type="hidden" [(ngModel)]="autor.urlFoto" name="urlFoto" />
            </div>

            <div
              class="mb-3 text-center"
              *ngIf="autor.urlFoto || imagenPrevisualizacion"
            >
              <label class="d-block mb-2">Vista Previa:</label>
              <img
                [src]="imagenPrevisualizacion || autor.urlFoto"
                alt="Vista previa"
                class="img-thumbnail rounded-circle"
                style="width: 120px; height: 120px; object-fit: cover"
              />
            </div>

            <div class="d-flex justify-content-end">
              <a routerLink="/autores" class="btn btn-secondary me-2"
                >Cancelar</a
              >
              <button type="submit" class="btn btn-primary">
                {{ isEditing ? 'Actualizar' : 'Guardar' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
