<div class="container mt-4">
  <h2>Mis Solicitudes</h2>

  <div class="row g-4">
    <div class="col-md-6" *ngFor="let p of prestamos">
      <div
        class="card shadow-sm border-start border-5"
        [ngClass]="{
             'border-warning': p.estado === 'PENDIENTE',
             'border-success': p.estado === 'APROBADO',
             'border-primary': p.estado === 'EN_PRESTAMO'
           }"
      >
        <div
          class="card-body d-flex justify-content-between align-items-center"
        >
          <div>
            <h5 class="card-title">{{ p.libro.titulo }}</h5>
            <p class="mb-1 text-muted">
              Fecha Solicitud: {{ p.fechaSolicitud }}
            </p>
            <span class="badge" [ngClass]="getClassEstado(p.estado)"
              >{{ p.estado }}</span
            >
          </div>

          <div *ngIf="p.estado === 'APROBADO'" class="text-center ms-3">
            <qrcode
              [qrdata]="'PRESTAMO-' + p.id"
              [width]="100"
              [errorCorrectionLevel]="'M'"
            ></qrcode>
            <p class="small text-muted mt-1">Muestra esto en biblioteca</p>
          </div>

          <div
            *ngIf="p.estado === 'PENDIENTE'"
            class="text-center ms-3 text-muted"
          >
            <span class="fs-1">⏳</span>
            <p class="small">Esperando aprobación...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
