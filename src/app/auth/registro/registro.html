<div class="auth-layout">
  <!-- Lado izquierdo -->
  <div class="auth-image d-none d-md-flex">
    <div class="overlay">
      <h1>Biblioteca Virtual</h1>
      <p>Crea tu cuenta y empieza a explorar libros.</p>
    </div>
  </div>

  <!-- Lado derecho -->
  <div class="auth-form-container">
    <div class="card auth-card shadow p-4">
      <div class="card-body">
        <h2 class="text-center mb-4">Crear Cuenta</h2>

        <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">
          <!-- usuario -->
          <div class="form-floating mb-3">
            <input
              type="text"
              id="username"
              class="form-control"
              formControlName="username"
              placeholder=" "
              [ngClass]="{ 'is-invalid': registroForm.get('username')?.invalid && registroForm.get('username')?.touched }"
            />
            <label for="username">Usuario</label>
            <div class="invalid-feedback">Mínimo 4 caracteres.</div>
          </div>

          <!-- email -->
          <div class="form-floating mb-3">
            <input
              type="email"
              id="email"
              class="form-control"
              formControlName="email"
              placeholder=" "
              [ngClass]="{ 'is-invalid': registroForm.get('email')?.invalid && registroForm.get('email')?.touched }"
            />
            <label for="email">Correo Electrónico</label>
            <div class="invalid-feedback">Ingresa un email válido.</div>
          </div>

          <!-- celular -->
          <div class="form-floating mb-3">
            <input
              type="tel"
              id="celular"
              class="form-control"
              formControlName="celular"
              placeholder=" "
              [ngClass]="{ 'is-invalid': registroForm.get('celular')?.invalid && registroForm.get('celular')?.touched }"
            />
            <label for="celular">Número de Celular</label>
            <div class="invalid-feedback">El celular es obligatorio.</div>
          </div>

          <!-- contraseña -->
          <div class="form-floating mb-3">
            <input
              type="password"
              id="password"
              class="form-control"
              formControlName="password"
              placeholder=" "
              [ngClass]="{ 'is-invalid': registroForm.get('password')?.invalid && registroForm.get('password')?.touched }"
            />
            <label for="password">Contraseña</label>
            <div class="invalid-feedback">Mínimo 4 caracteres.</div>
          </div>

          <div class="d-grid">
            <button
              type="submit"
              class="btn btn-success"
              [disabled]="registroForm.invalid"
            >
              Registrarse
            </button>
          </div>
        </form>

        <div class="mt-3 text-center">
          <small
            >¿Ya tienes cuenta?
            <a routerLink="/auth/login">Inicia Sesión aquí</a></small
          >
        </div>
      </div>
    </div>
  </div>
</div>
